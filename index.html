<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NODES // VIEWER</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --c:#00e5ff;--cd:rgba(0,229,255,0.22);--cg:rgba(0,229,255,0.08);
  --o:#ff6d00;--og:rgba(255,109,0,0.15);
  --bg:#000810;--bg2:#000d1a;--bg3:#001222;
  --txt:#c8f0f8;--dim:#5ab8cc;--dim2:#1e5060;
  --ok:#00ffb3;--fail:#ff3366;
  --grid:rgba(0,229,255,0.06);
}
body.ares{
  --c:#ff2200;--cd:rgba(255,34,0,0.28);--cg:rgba(255,34,0,0.09);
  --o:#ff7700;--og:rgba(255,119,0,0.18);
  --bg:#080000;--bg2:#100000;--bg3:#160200;
  --txt:#ffb89a;--dim:#d06040;--dim2:#5a1a08;
  --ok:#ff6600;--fail:#ff0044;
  --grid:rgba(255,34,0,0.06);
}
body{background:var(--bg);color:var(--txt);font-family:'Share Tech Mono',monospace;
  height:100vh;width:100vw;overflow:hidden;display:flex;flex-direction:column;}
body::after{content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.12) 3px,rgba(0,0,0,0.12) 4px);
  pointer-events:none;z-index:9999;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:44px 44px;pointer-events:none;z-index:0;}

/* ══ CORNER DECORATORS ══ */
.cdec{position:fixed;width:56px;height:56px;pointer-events:none;z-index:30;}
.cdec.tl{top:0;left:0;border-top:2px solid var(--c);border-left:2px solid var(--c);}
.cdec.tr{top:0;right:0;border-top:2px solid var(--c);border-right:2px solid var(--c);}
.cdec.bl{bottom:0;left:0;border-bottom:2px solid var(--c);border-left:2px solid var(--c);}
.cdec.br{bottom:0;right:0;border-bottom:2px solid var(--c);border-right:2px solid var(--c);}

/* ══ HEADER ══ */
.mhdr{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;height:100px;border-bottom:1px solid var(--dim);
  background:rgba(0,8,16,.97);flex-shrink:0;}
.mhdr-left{display:flex;flex-direction:column;justify-content:center;}
.mhdr-logo{font-family:'Orbitron',monospace;font-size:1.9rem;font-weight:900;letter-spacing:.4em;
  color:var(--c);text-shadow:0 0 22px var(--c),0 0 50px rgba(0,229,255,.15);}
.mhdr-center{display:flex;flex-direction:column;align-items:center;gap:8px;}
.mhdr-stat{display:flex;gap:24px;font-size:.78rem;letter-spacing:.15em;color:var(--txt);align-items:center;}
.stat-dot{width:10px;height:10px;border-radius:50%;background:var(--ok);
  box-shadow:0 0 10px var(--ok),0 0 22px var(--ok);
  display:inline-block;margin-right:8px;animation:blink 2s infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.theme-toggle{display:flex;border:1px solid var(--dim2);overflow:hidden;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));}
.tt-btn{padding:8px 28px;font-family:'Orbitron',monospace;font-size:.78rem;font-weight:700;
  letter-spacing:.25em;cursor:pointer;border:none;background:transparent;color:var(--dim);transition:all .15s;}
.tt-btn.on{background:var(--cd);color:var(--c);text-shadow:0 0 12px var(--c);}
.tt-btn:hover:not(.on){color:var(--txt);background:rgba(255,255,255,.04);}
.hdr-ctrl-row{display:flex;gap:8px;}
.hdr-btn{font-size:.72rem;letter-spacing:.22em;color:var(--dim);cursor:pointer;
  padding:7px 16px;border:1px solid var(--dim2);transition:all .18s;
  font-family:'Share Tech Mono',monospace;background:transparent;
  clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px));}
.hdr-btn:hover{border-color:var(--c);color:var(--c);background:rgba(0,229,255,.07);
  box-shadow:0 0 16px rgba(0,229,255,.25);}
.mhdr-right{display:flex;align-items:center;}
#laser-cv{display:block;}

/* ══ BODY ══ */
.mbody{position:relative;z-index:10;display:flex;flex:1;overflow:hidden;}

/* ══ SIDEBAR ══ */
.sidebar{width:230px;flex-shrink:0;border-right:1px solid var(--dim);padding:20px 14px;
  display:flex;flex-direction:column;gap:4px;background:rgba(0,8,16,.85);overflow-y:auto;}
.sl{font-size:.65rem;letter-spacing:.3em;color:var(--dim);margin:14px 0 8px 8px;}
.si{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
  border:1px solid transparent;cursor:pointer;font-size:.85rem;letter-spacing:.08em;
  color:var(--txt);transition:all .15s;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));}
.si:hover,.si.on{background:var(--cg);border-color:var(--dim);color:var(--c);}
.si.on{border-color:var(--cd);}
.sb{font-family:'Orbitron',monospace;font-size:.68rem;color:var(--dim);}
.si.on .sb,.si:hover .sb{color:var(--c);}

/* ══ NOTE AREA ══ */
.narea{flex:1;overflow-y:auto;padding:26px;}
.ntool{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.nsec{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:700;color:var(--c);letter-spacing:.22em;}
.ntool-right{display:flex;align-items:center;gap:12px;}
.ncnt{font-size:.72rem;color:var(--txt);letter-spacing:.2em;}
.sort-btn{font-size:.68rem;letter-spacing:.2em;color:var(--dim);cursor:pointer;
  padding:6px 14px;border:1px solid var(--dim2);transition:all .18s;
  font-family:'Share Tech Mono',monospace;display:flex;align-items:center;gap:6px;background:transparent;
  clip-path:polygon(0 0,calc(100% - 5px) 0,100% 5px,100% 100%,5px 100%,0 calc(100% - 5px));}
.sort-btn:hover{border-color:var(--c);color:var(--c);background:rgba(0,229,255,.06);}
.sort-icon{display:inline-block;transition:transform .2s;}
.sort-btn.asc .sort-icon{transform:rotate(180deg);}

/* ══ NOTE GRID ══ */
.ngrid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.nc{background:var(--bg2);border:1px solid var(--dim);padding:28px;position:relative;
  cursor:pointer;transition:all .2s;
  clip-path:polygon(0 0,calc(100% - 18px) 0,100% 18px,100% 100%,18px 100%,0 calc(100% - 18px));}
.nc::after{content:'';position:absolute;top:0;right:0;width:18px;height:18px;
  background:var(--dim);clip-path:polygon(0 0,100% 0,100% 100%);transition:background .2s;}
.nc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--c),transparent);opacity:0;transition:opacity .2s;}
.nc:hover{border-color:var(--cd);background:rgba(0,229,255,.03);box-shadow:0 0 32px rgba(0,229,255,.1);}
.nc:hover::after{background:var(--c);}
.nc:hover::before{opacity:1;}
.nc-id{font-size:.66rem;color:var(--dim);letter-spacing:.22em;margin-bottom:10px;font-family:'Orbitron',monospace;}
.nc-title{font-family:'Orbitron',monospace;font-size:1.05rem;font-weight:600;color:var(--c);
  margin-bottom:12px;line-height:1.4;letter-spacing:.04em;}
.nc-preview{font-size:.83rem;color:var(--txt);line-height:1.8;margin-bottom:18px;
  display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;}
.nc-foot{display:flex;align-items:center;justify-content:space-between;}
.nc-tags{display:flex;gap:5px;flex-wrap:wrap;}
.tg{font-size:.65rem;padding:3px 10px;border:1px solid var(--dim);color:var(--txt);letter-spacing:.08em;transition:all .15s;}
.nc:hover .tg{border-color:var(--c);color:var(--c);}
.nc-date{font-size:.65rem;color:var(--dim);letter-spacing:.08em;}
.nc{animation:fadeUp .4s ease backwards;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

/* ══ DETAIL OVERLAY ══ */
#detail{position:fixed;inset:0;background:rgba(0,4,10,.94);z-index:200;
  display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
#detail.open{opacity:1;pointer-events:all;}
.det-inner{max-width:720px;width:90%;max-height:82vh;overflow-y:auto;
  background:var(--bg2);border:1px solid var(--c);padding:40px;position:relative;
  clip-path:polygon(0 0,calc(100% - 22px) 0,100% 22px,100% 100%,22px 100%,0 calc(100% - 22px));
  box-shadow:0 0 60px rgba(0,229,255,.12);}
.det-close{position:absolute;top:16px;right:22px;background:none;border:none;
  color:var(--dim);font-family:'Orbitron',monospace;font-size:.82rem;cursor:pointer;
  letter-spacing:.2em;transition:color .15s;padding:4px 8px;}
.det-close:hover{color:var(--c);}
.det-id{font-size:.68rem;color:var(--dim);letter-spacing:.3em;margin-bottom:12px;font-family:'Orbitron',monospace;}
.det-title{font-family:'Orbitron',monospace;font-size:1.45rem;font-weight:700;color:var(--c);
  margin-bottom:12px;line-height:1.4;text-shadow:0 0 14px var(--cd);}
.det-meta{display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-bottom:24px;padding-bottom:16px;
  border-bottom:1px solid var(--dim2);font-size:.75rem;color:var(--txt);letter-spacing:.1em;}
.det-body{font-size:.88rem;line-height:1.9;color:var(--txt);white-space:pre-wrap;}

/* ══ SERVER MODAL ══ */
.srv-modal{position:fixed;inset:0;background:rgba(0,4,10,.92);z-index:300;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;}
.srv-box{background:var(--bg2);border:1px solid var(--c);padding:36px 40px;max-width:460px;width:90%;
  clip-path:polygon(0 0,calc(100% - 20px) 0,100% 20px,100% 100%,20px 100%,0 calc(100% - 20px));}
.srv-title{font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;color:var(--c);
  letter-spacing:.25em;margin-bottom:12px;}
.srv-body{font-size:.72rem;color:var(--txt);line-height:1.8;margin-bottom:20px;}
.srv-code{background:var(--bg3);border:1px solid var(--dim2);padding:10px 14px;
  font-size:.78rem;color:var(--ok);letter-spacing:.1em;margin-bottom:20px;}
.srv-btns{display:flex;gap:10px;justify-content:flex-end;}
.srv-btn{font-family:'Share Tech Mono',monospace;font-size:.65rem;letter-spacing:.2em;
  padding:8px 18px;border:1px solid var(--dim2);background:transparent;color:var(--dim);cursor:pointer;transition:all .15s;}
.srv-btn:hover{border-color:var(--c);color:var(--c);}
.srv-btn.primary{border-color:var(--c);color:var(--c);}
.srv-btn.primary:hover{background:rgba(0,229,255,.1);}

/* ══ SCROLLBAR ══ */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--dim2);}
::-webkit-scrollbar-thumb:hover{background:var(--c);}
</style>
</head>
<body>
<div class="cdec tl"></div><div class="cdec tr"></div>
<div class="cdec bl"></div><div class="cdec br"></div>

<!-- ═══ HEADER ═══ -->
<div class="mhdr">
  <div class="mhdr-left">
    <div class="mhdr-logo">NODES</div>
  </div>
  <div class="mhdr-center">
    <div class="mhdr-stat">
      <span><span class="stat-dot"></span>ONLINE</span>
      <span id="hdr-date"></span>
      <span id="hdr-count"></span>
    </div>
    <div class="theme-toggle">
      <button class="tt-btn on" id="tt-classic" onclick="setTheme('classic')">CLASSIC</button>
      <button class="tt-btn"    id="tt-ares"    onclick="setTheme('ares')">ARES</button>
    </div>
    <div class="hdr-ctrl-row">
      <button class="hdr-btn" id="btn-edit" onclick="launchEditor()">[ EDIT ]</button>
      <button class="hdr-btn" onclick="lock()">[ LOCK ]</button>
    </div>
  </div>
  <div class="mhdr-right">
    <canvas id="laser-cv" width="260" height="84"></canvas>
  </div>
</div>

<!-- ═══ BODY ═══ -->
<div class="mbody">
  <div class="sidebar" id="sidebar"></div>
  <div class="narea">
    <div class="ntool">
      <div class="nsec" id="sec-label">ALL NODES</div>
      <div class="ntool-right">
        <div class="ncnt" id="note-count"></div>
        <button class="sort-btn" id="sort-btn" onclick="toggleSort()">
          <span class="sort-icon">↓</span> DATE
        </button>
      </div>
    </div>
    <div class="ngrid" id="ngrid"></div>
  </div>
</div>

<!-- ═══ DETAIL OVERLAY ═══ -->
<div id="detail">
  <div class="det-inner">
    <button class="det-close" onclick="closeDetail()">[ CLOSE ]</button>
    <div class="det-id"    id="det-id"></div>
    <div class="det-title" id="det-title"></div>
    <div class="det-meta"  id="det-meta"></div>
    <div class="det-body"  id="det-body"></div>
  </div>
</div>

<!-- ═══ SERVER MODAL ═══ -->
<div class="srv-modal" id="srv-modal">
  <div class="srv-box">
    <div class="srv-title">LOCAL SERVER REQUIRED</div>
    <div class="srv-body">The editor requires the local Python server to be running. Start it with:</div>
    <div class="srv-code">python nodes_server.py</div>
    <div class="srv-btns">
      <button class="srv-btn" onclick="closeSrvModal()">CANCEL</button>
      <button class="srv-btn primary" id="copy-btn" onclick="copyCmd()">[ COPY ]</button>
      <button class="srv-btn primary" onclick="openEditor()">OPEN ANYWAY</button>
    </div>
  </div>
</div>

<script>
// ══ AUTH GATE ════════════════════════════
(function authGate() {
  const local = ['localhost','127.0.0.1'].includes(location.hostname);
  if (local) {
    sessionStorage.setItem('nodes_auth','1');
  } else if (!sessionStorage.getItem('nodes_auth')) {
    window.location.href = 'index.html';
  }
})();

// ══ STATE ════════════════════════════════
let NOTES        = [];
let activeFilter = 'ALL';
let sortOrder    = 'desc';
let currentTheme = sessionStorage.getItem('nodes_theme') || 'classic';

// Apply theme immediately
if (currentTheme === 'ares') document.body.classList.add('ares');
document.getElementById('tt-classic').classList.toggle('on', currentTheme === 'classic');
document.getElementById('tt-ares').classList.toggle('on', currentTheme === 'ares');

// ══ THEME ════════════════════════════════
function setTheme(t) {
  currentTheme = t;
  document.body.classList.toggle('ares', t === 'ares');
  document.getElementById('tt-classic').classList.toggle('on', t === 'classic');
  document.getElementById('tt-ares').classList.toggle('on',    t === 'ares');
  sessionStorage.setItem('nodes_theme', t);
}

// ══ LOCK ═════════════════════════════════
function lock() {
  sessionStorage.removeItem('nodes_auth');
  window.location.href = 'index.html';
}

// ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓
// ▓  NEW — hide [ EDIT ] when served from GitHub Pages   ▓
// ▓  localhost / 127.0.0.1  →  button visible            ▓
// ▓  any other host         →  button hidden             ▓
// ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓
(function hideEditOnRemote() {
  const local = ['localhost','127.0.0.1'].includes(location.hostname);
  if (!local) {
    const btn = document.getElementById('btn-edit');
    if (btn) btn.style.display = 'none';
  }
})();
// ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓

// ══ LOAD NOTES ═══════════════════════════
async function loadNotes() {
  // Try local server first (CRUD-enabled), fall back to static JSON
  const sources = ['http://localhost:5000/notes', './data/notes.json'];
  for (const src of sources) {
    try {
      const r = await fetch(src, { signal: AbortSignal.timeout(800) });
      if (r.ok) { NOTES = await r.json(); break; }
    } catch(e) { /* try next */ }
  }
  buildSidebar();
  renderNotes();
  document.getElementById('hdr-count').textContent = `${NOTES.length} NODES LOADED`;
}

// ══ SIDEBAR ══════════════════════════════
function buildSidebar() {
  const cats = ['ALL', ...new Set(NOTES.map(n => n.category))];
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<div class="sl">CATEGORIES</div>';
  cats.forEach(c => {
    const cnt = c === 'ALL' ? NOTES.length : NOTES.filter(n => n.category === c).length;
    const d = document.createElement('div');
    d.className = 'si' + (c === activeFilter ? ' on' : '');
    d.innerHTML = `<span>${c}</span><span class="sb">${cnt}</span>`;
    d.onclick = () => { activeFilter = c; renderNotes(); buildSidebar(); };
    sb.appendChild(d);
  });
}

// ══ SORT ══════════════════════════════════
function toggleSort() {
  sortOrder = sortOrder === 'desc' ? 'asc' : 'desc';
  document.getElementById('sort-btn').classList.toggle('asc', sortOrder === 'asc');
  renderNotes();
}

// ══ RENDER NOTES ══════════════════════════
function renderNotes() {
  let filtered = activeFilter === 'ALL'
    ? [...NOTES] : NOTES.filter(n => n.category === activeFilter);
  filtered.sort((a, b) =>
    sortOrder === 'desc'
      ? (b.date||'').localeCompare(a.date||'')
      : (a.date||'').localeCompare(b.date||''));

  document.getElementById('sec-label').textContent =
    activeFilter === 'ALL' ? 'ALL NODES' : activeFilter.toUpperCase();
  document.getElementById('note-count').textContent =
    `${filtered.length} RECORD${filtered.length !== 1 ? 'S' : ''}`;

  const g = document.getElementById('ngrid');
  g.innerHTML = '';
  filtered.forEach((note, i) => {
    const c = document.createElement('div');
    c.className = 'nc';
    c.style.animationDelay = `${i * 55}ms`;
    c.innerHTML = `
      <div class="nc-id">${note.id} · ${note.category.toUpperCase()}</div>
      <div class="nc-title">${note.title}</div>
      <div class="nc-preview">${note.preview}</div>
      <div class="nc-foot">
        <div class="nc-tags">${note.tags.map(t=>`<span class="tg">${t}</span>`).join('')}</div>
        <div class="nc-date">${note.date}</div>
      </div>`;
    c.onclick = () => openDetail(note);
    g.appendChild(c);
  });
}

// ══ DETAIL ═══════════════════════════════
function openDetail(note) {
  document.getElementById('det-id').textContent    = `${note.id}  ·  ${note.category.toUpperCase()}`;
  document.getElementById('det-title').textContent = note.title;
  document.getElementById('det-meta').innerHTML    =
    `<span>${note.date}</span>` +
    note.tags.map(t=>`<span class="tg">${t}</span>`).join('') +
    `<span style="color:var(--dim)">${note.category}</span>`;
  document.getElementById('det-body').textContent  = note.content;
  document.getElementById('detail').classList.add('open');
}
function closeDetail() {
  document.getElementById('detail').classList.remove('open');
}
document.getElementById('detail').addEventListener('click', e => {
  if (e.target === document.getElementById('detail')) closeDetail();
});

// ══ EDITOR LAUNCH ════════════════════════
async function launchEditor() {
  let serverUp = false;
  try {
    const r = await fetch('http://localhost:5000/ping', { signal: AbortSignal.timeout(800) });
    serverUp = r.ok;
  } catch(e) {}
  if (serverUp) { window.open('http://localhost:5000', '_blank'); return; }
  const m = document.getElementById('srv-modal');
  m.style.opacity = '1'; m.style.pointerEvents = 'all';
}
function openEditor() {
  closeSrvModal();
  window.open('http://localhost:5000', '_blank');
}
function closeSrvModal() {
  const m = document.getElementById('srv-modal');
  m.style.opacity = '0'; m.style.pointerEvents = 'none';
}
function copyCmd() {
  navigator.clipboard.writeText('python nodes_server.py').then(() => {
    const b = document.getElementById('copy-btn');
    b.textContent = '[ COPIED ]';
    setTimeout(() => b.textContent = '[ COPY ]', 1800);
  });
}

// ══ LASER ETCH WIDGET ════════════════════
function startLaser() {
  const cv = document.getElementById('laser-cv');
  if (!cv || cv._running) return;
  cv._running = true;
  const ctx = cv.getContext('2d'), W = cv.width, H = cv.height;

  const TRACES = [
    [8,8,252,8],[8,76,252,76],[8,8,8,76],[252,8,252,76],
    [40,8,40,24],[40,24,72,24],[72,24,72,8],
    [48,24,48,36],[56,24,56,36],[64,24,64,36],
    [104,8,104,28],[104,28,148,28],[148,28,148,8],
    [112,28,112,44],[120,28,120,44],[128,28,128,44],[136,28,136,44],[144,28,144,44],
    [184,8,184,24],[184,24,220,24],[220,24,220,8],
    [192,24,192,36],[200,24,200,36],[208,24,208,36],
    [40,76,40,60],[40,60,72,60],[72,60,72,76],
    [48,60,48,48],[56,60,56,48],[64,60,64,48],
    [184,76,184,60],[184,60,220,60],[220,60,220,76],
    [192,60,192,48],[200,60,200,48],[208,60,208,48],
    [8,44,96,44],[160,44,252,44],
    [96,44,104,36],[148,36,160,44],
    [126,44,126,28],[126,44,126,60],[126,60,126,76],
    [24,8,24,20],[24,20,36,20],[236,8,236,20],[236,20,248,20],
    [24,76,24,64],[24,64,36,64],[236,76,236,64],[236,64,248,64],
  ];
  const VIAS = [
    [8,8],[252,8],[8,76],[252,76],[40,8],[72,8],[104,8],[148,8],[184,8],[220,8],
    [40,76],[72,76],[184,76],[220,76],[48,36],[56,36],[64,36],[192,36],[200,36],[208,36],
    [48,48],[56,48],[64,48],[192,48],[200,48],[208,48],
    [112,44],[120,44],[128,44],[136,44],[144,44],[126,44],[126,60],[96,44],[160,44],
  ];

  const off = document.createElement('canvas');
  off.width = W; off.height = H;
  const octx = off.getContext('2d');
  const etched = new Array(TRACES.length).fill(false);
  let ti = 0, prog = 0, t0 = null;
  const SPD = 180;

  function gc(a) { return document.body.classList.contains('ares') ? `rgba(255,100,0,${a})` : `rgba(0,229,255,${a})`; }
  function gv(a) { return document.body.classList.contains('ares') ? `rgba(255,180,0,${a})` : `rgba(0,255,179,${a})`; }

  function redraw() {
    octx.clearRect(0,0,W,H);
    octx.fillStyle = document.body.classList.contains('ares') ? 'rgba(30,5,0,0.4)' : 'rgba(0,20,10,0.4)';
    octx.fillRect(0,0,W,H);
    TRACES.forEach(([x1,y1,x2,y2],i) => {
      if (!etched[i]) return;
      octx.beginPath(); octx.moveTo(x1,y1); octx.lineTo(x2,y2);
      octx.strokeStyle = gc(0.55); octx.lineWidth = 1.5; octx.stroke();
      octx.beginPath(); octx.moveTo(x1,y1); octx.lineTo(x2,y2);
      octx.strokeStyle = gc(0.15); octx.lineWidth = 4;   octx.stroke();
    });
    if (ti < TRACES.length) {
      const [x1,y1,x2,y2] = TRACES[ti];
      const px = x1+(x2-x1)*prog, py = y1+(y2-y1)*prog;
      octx.beginPath(); octx.moveTo(x1,y1); octx.lineTo(px,py);
      octx.strokeStyle = gc(0.55); octx.lineWidth = 1.5; octx.stroke();
      octx.beginPath(); octx.moveTo(x1,y1); octx.lineTo(px,py);
      octx.strokeStyle = gc(0.15); octx.lineWidth = 4;   octx.stroke();
    }
    VIAS.forEach(([vx,vy]) => {
      octx.beginPath(); octx.arc(vx,vy,2.5,0,Math.PI*2);
      octx.fillStyle = gv(0.8); octx.fill();
      octx.strokeStyle = gc(0.5); octx.lineWidth = 1; octx.stroke();
    });
  }

  function frame(ts) {
    if (!t0) t0 = ts;
    const dt = (ts - t0) / 1000; t0 = ts;
    if (ti < TRACES.length) {
      const [x1,y1,x2,y2] = TRACES[ti];
      const len = Math.hypot(x2-x1, y2-y1) || 1;
      prog += (SPD * dt) / len;
      if (prog >= 1) {
        etched[ti] = true; prog = 0; ti++;
        if (ti >= TRACES.length) { ti = 0; etched.fill(false); }
      }
    }
    redraw();
    ctx.clearRect(0,0,W,H); ctx.drawImage(off,0,0);
    if (ti < TRACES.length) {
      const [x1,y1,x2,y2] = TRACES[ti];
      const lx = x1+(x2-x1)*prog, ly = y1+(y2-y1)*prog;
      const bloom = ctx.createRadialGradient(lx,ly,0,lx,ly,14);
      bloom.addColorStop(0,gc(0.9)); bloom.addColorStop(0.4,gc(0.4)); bloom.addColorStop(1,gc(0));
      ctx.fillStyle = bloom; ctx.beginPath(); ctx.arc(lx,ly,14,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.beginPath(); ctx.arc(lx,ly,2,0,Math.PI*2); ctx.fill();
      const trail = ctx.createLinearGradient(
        x1+(x2-x1)*Math.max(0,prog-.15), y1+(y2-y1)*Math.max(0,prog-.15), lx, ly);
      trail.addColorStop(0,gc(0)); trail.addColorStop(1,gc(0.6));
      ctx.beginPath();
      ctx.moveTo(x1+(x2-x1)*Math.max(0,prog-.15), y1+(y2-y1)*Math.max(0,prog-.15));
      ctx.lineTo(lx,ly); ctx.strokeStyle = trail; ctx.lineWidth = 2; ctx.stroke();
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

// ══ BOOT ══════════════════════════════════
document.getElementById('hdr-date').textContent =
  new Date().toISOString().slice(0,10).replace(/-/g,'.');

loadNotes();
startLaser();
</script>
